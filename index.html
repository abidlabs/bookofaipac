<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book of AIPAC</title>
    <link rel="stylesheet" href="./assets/css/main.css" />
  </head>
  <body>
    <div class="stars" aria-hidden="true" id="stars"></div>

    <main class="landing">
      <nav class="top-nav">
        <a href="./api/index.html" class="nav-link">API docs</a>
        <a href="./api/index.json" class="nav-link">JSON</a>
      </nav>

      <section class="hero">
        <p class="eyebrow">Accountability database</p>
        <h1 class="site-title">Book of <em>AIPAC</em></h1>
        <p class="site-tagline">
          Search politicians to see which ones are funded by the Israel lobby.
        </p>

        <div class="search-wrap">
          <div class="search-box">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
              <circle cx="9" cy="9" r="5.5"/>
              <path d="M14 14L17.5 17.5"/>
            </svg>
            <label for="candidateSearch" class="sr-only">Search by name</label>
            <input
              id="candidateSearch"
              type="text"
              placeholder="Search a candidate, official, or state…"
              autocomplete="off"
              spellcheck="false"
              aria-controls="searchResults"
              aria-expanded="false"
            />
          </div>
          <div id="searchResults" class="results" role="listbox"></div>
        </div>
        <div class="state-shortcut-wrap">
          <button id="myStateButton" class="my-state-button" type="button">Politicians from my state</button>
          <p id="myStateStatus" class="my-state-status" aria-live="polite"></p>
        </div>

      </section>

      <section class="ticker-section" id="tickerSection" hidden>
        <p class="ticker-label">Recently profiled</p>
        <div class="ticker-outer">
          <div class="ticker-track" id="candidateTicker"></div>
        </div>
      </section>

      <footer class="site-footer">
        <div class="footer-stat">
          <span class="stat-value" id="datasetTotal">Loading…</span>
          <span class="stat-subvalue" id="datasetMeta">Loading breakdown…</span>
        </div>
        <p class="footer-disclaimer">
          AI was used to extract information and some entries may be outdated or incorrect.
          <a href="https://github.com/abidlabs/bookofaipac/compare" target="_blank" rel="noreferrer noopener">Open a PR to update information.</a>
        </p>
      </footer>
    </main>

    <script type="module" src="./assets/js/footer.js?v=20260304"></script>
    <script type="module" src="./assets/js/search.js?v=20260304"></script>
    <script type="module" src="./assets/js/location-state.js?v=20260304"></script>
  </body>
</html>
